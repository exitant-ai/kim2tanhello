# Render 'Deploy to Render' 버튼용 청사진
services:
  - type: worker
    name: muhan-signal-bot
    runtime: python
    plan: starter            # 항상 켜짐 (폴링 봇이라 필요)
    buildCommand: "pip install tzdata"
    startCommand: "python bot_server.py"
    envVars:
      - key: TOKEN           # @BotFather 봇 토큰 (설치자가 입력)
        sync: false
      - key: TD_KEY          # Twelve Data API 키 (설치자가 입력)
        sync: false
      - key: WEBAPP_URL      # 설정 미니앱 주소 (공용 호스팅 기본값)
        value: "https://exitant-ai.github.io/kim2tanhello/config.html"
